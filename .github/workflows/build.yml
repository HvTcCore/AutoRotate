name: Build AutoRotate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages (required for theos packaging)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang lld ccache git wget unzip curl python3 pkg-config \
            libssl-dev dpkg-dev debhelper devscripts fakeroot perl libplist-utils xz-utils bzip2 lzip libbz2-dev
            sudo apt-get install -y ldid || true

      - name: NDT
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev devscripts

      - name: Install Theos & toolchain
        run: |
          THEOS="$HOME/theos"
          mkdir -p "$THEOS"
          git clone --depth=1 https://github.com/theos/theos.git "$THEOS" || true
          TOOLCHAIN_TAR="/tmp/toolchain.tar.xz"
          curl -fsSL "https://github.com/theos/toolchain/releases/latest/download/toolchain.tar.xz" -o "$TOOLCHAIN_TAR" || true
          if [ -s "$TOOLCHAIN_TAR" ]; then
            mkdir -p "$THEOS/toolchain"
            tar -xJf "$TOOLCHAIN_TAR" -C "$THEOS/toolchain" || true
          else
            git clone --depth=1 https://github.com/theos/toolchain.git "$THEOS/toolchain" || true
          fi
          ls $THEOS/
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/toolchain/linux/iphone/bin" >> $GITHUB_PATH
          echo PATH=$PATH:$THEOS/bin

      - name: Verify toolchain & fallback clang
        run: |
          THEOS="${THEOS:-$HOME/theos}"
          BIN="$THEOS/toolchain/linux/iphone/bin"
          if [ ! -x "$BIN/clang" ]; then
            mkdir -p "$BIN"
            if command -v clang >/dev/null 2>&1; then
              ln -sf "$(command -v clang)" "$BIN/clang"
              ln -sf "$(command -v clang++)" "$BIN/clang++" || true
            fi
          fi
          "$BIN/clang" --version || true

      - name: Build package
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          export THEOS="${THEOS:-$HOME/theos}"
          export PATH="$THEOS/toolchain/linux/iphone/bin:$PATH"
          cd $GITHUB_WORKSPACE
          make package -j$(nproc)

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autorotate-debs
          path: packages/*.deb
