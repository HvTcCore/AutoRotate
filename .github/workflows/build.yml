name: Build AutoRotate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld ccache git wget unzip curl python3 pkg-config libssl-dev \
            dpkg-dev debhelper devscripts perl libplist-utils libbz2-dev || true
          # ldid may not be in apt on all runners; allow failure
          sudo apt-get install -y ldid || true

      - name: Install Theos
        run: |
          git clone --depth=1 https://github.com/theos/theos.git $HOME/theos
          # clone theos toolchain (contains linux/iphone prebuilt toolchains)
          git clone --depth=1 https://github.com/theos/toolchain.git $HOME/theos/toolchain || true
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/toolchain/linux/iphone/bin:$PATH" >> $GITHUB_ENV

      - name: Bootstrap Theos toolchain (download prebuilt toolchains)
        run: |
          export THEOS="$HOME/theos"
          # try known bootstrap scripts shipped with the toolchain repo
          if [ -f "$THEOS/toolchain/bootstrap.sh" ]; then
            bash "$THEOS/toolchain/bootstrap.sh" || true
          elif [ -f "$THEOS/toolchain/bootstrap" ]; then
            bash "$THEOS/toolchain/bootstrap" || true
          else
            echo "No bootstrap script found in $THEOS/toolchain; listing contents:" >&2
            ls -la "$THEOS/toolchain" || true
            echo "If the toolchain does not contain prebuilt binaries, add a step to download a prebuilt toolchain tarball from theos/toolchain releases." >&2
          fi

      - name: Verify toolchain
        run: |
          export THEOS="$HOME/theos"
          if [ ! -x "$THEOS/toolchain/linux/iphone/bin/clang" ]; then
            ls -la $THEOS/toolchain || true
            echo "Toolchain clang not found in $THEOS/toolchain/linux/iphone/bin" && exit 1
          fi
          $THEOS/toolchain/linux/iphone/bin/clang --version || true

      - name: Build package
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          export THEOS="$HOME/theos"
          export PATH="$THEOS/toolchain/linux/iphone/bin:$PATH"
          cd $GITHUB_WORKSPACE
          make package -j$(nproc)

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autorotate-debs
          path: packages/*.deb