name: Build AutoRotate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld ccache git wget unzip curl python3 pkg-config \
            libssl-dev dpkg-dev debhelper fakeroot perl libplist-utils xz-utils lzip libbz2-dev || true
          # ldid optional on runners
          sudo apt-get install -y ldid || true

      - name: Install Theos
        env:
          THEOS: ${{ runner.home }}/theos
        run: |
          git clone --depth=1 https://github.com/theos/theos.git "${THEOS}"
          # clone toolchain (prebuilt toolchains)
          git clone --depth=1 https://github.com/theos/toolchain.git "${THEOS}/toolchain" || true
          echo "THEOS=${THEOS}" >> $GITHUB_ENV
          echo "${THEOS}/toolchain/linux/iphone/bin" >> $GITHUB_PATH

      - name: Verify toolchain (informational)
        run: |
          export THEOS="${THEOS:-$HOME/theos}"
          if [ -x "$THEOS/toolchain/linux/iphone/bin/clang" ]; then
            "$THEOS/toolchain/linux/iphone/bin/clang" --version || true
          else
            echo "Warning: clang not found in $THEOS/toolchain/linux/iphone/bin — build may still work if system clang is usable."
          fi
          # ensure dm.pl (provided by dpkg-dev) exists
          if ! command -v dm.pl >/dev/null 2>&1; then
            echo "dm.pl not found; dpkg-dev installation may have failed." || true
          fi

      - name: Build package
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          export THEOS="${THEOS:-$HOME/theos}"
          export PATH="$THEOS/toolchain/linux/iphone/bin:$PATH"
          cd $GITHUB_WORKSPACE
          make package -j$(nproc)

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autorotate-debs
          path: packages/*.deb
